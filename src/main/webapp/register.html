<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register - eMarketplace</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
  <h1 onclick="window.location.href='index.html'">eMarketplace</h1>
  <div id="auth-actions">
    <a href="login.html" class="btn-new">Login</a>
  </div>
</header>

<div class="container">
  <div class="form-container">
    <h2>Register</h2>
    <form id="registerForm">
      <div class="form-group" style="margin-bottom: 20px;">
        <label for="username">Username (8-20 characters, letters/numbers only)</label>
        <input type="text" id="username" name="username" pattern="^[a-zA-Z0-9]{8,20}$" required>
      </div>
      <div class="form-group" style="margin-bottom: 20px;">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div class="form-group" style="margin-bottom: 20px;">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>
      <div class="form-group" style="margin-bottom: 20px;">
        <label for="birthday">Birthday</label>
        <input type="date" id="birthday" name="birthday" required>
      </div>
      <button type="submit" class="btn-submit">Sign Up</button>
    </form>
  </div>
</div>

<script src="register.js"></script>
</body>
</html>
