<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>eMarketplace</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
    <h1 onclick="window.location.href='index.html'">eMarketplace</h1>
    <div id="auth-actions">
    </div>
</header>

<div class="container">
    <div class="sort-container">
        <label for="sortParam">Sort by:</label>
        <select id="sortParam" onchange="changeSort()">
            <option value="dateDesc">Date Descending</option>
            <option value="dateAsc">Date Ascending</option>
            <option value="priceAsc">Price Ascending</option>
            <option value="priceDesc">Price Descending</option>
        </select>
    </div>

    <div class="grid" id="itemsGrid"></div>

    <div class="pagination">
        <button id="prevBtn" onclick="changePage(-1)">&lt;</button>
        <span id="pageIndicator">1</span>
        <button id="nextBtn" onclick="changePage(1)">&gt;</button>
    </div>
</div>

<script src="index.js"></script>
</body>
</html>
